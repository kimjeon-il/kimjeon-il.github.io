    <aside class="mobile-drawer" id="mobileDrawer" aria-hidden="true">

        <strong>메뉴</strong>
        <button class="ui-icon-button mobile-drawer-close" type="button" aria-label="메뉴 닫기">×</button>
      </div>
      <nav class="mobile-drawer-nav" aria-label="모바일 메뉴">
        <section class="mobile-drawer-section">
          <button class="ui-button mobile-primary" type="button" data-category-catalog-open>도감</button>
          <div class="mobile-secondary" aria-label="도감 분류">

            <button class="ui-tab-button" type="button" data-mobile-catalog-scope="tools">장비</button>

        <section class="mobile-drawer-section">

        </section>
      </nav>

    <main>
      <section class="catalog-section active" id="catalogContent">
        <div class="unified-search">
          <div class="search-box global-search-box">
            <details class="search-scope catalog-dropdown" id="globalSearchScope" data-scope="all" aria-label="검색 범위">
              <summary><b class="catalog-dropdown-value">전체</b></summary>
              <div class="catalog-dropdown-menu">
                <button type="button" class="ui-dropdown-item active" data-global-search-scope="all">전체</button>
                <button type="button" class="ui-dropdown-item" data-global-search-scope="bey">베이</button>
                <button type="button" class="ui-dropdown-item" data-global-search-scope="tools">장비</button>
                <button type="button" class="ui-dropdown-item" data-global-search-scope="product">제품</button>
                <button type="button" class="ui-dropdown-item" data-global-search-scope="manga">만화</button>
                <button type="button" class="ui-dropdown-item" data-global-search-scope="anime">애니</button>
              </div>
            </details>
            <span class="search-icon" aria-hidden="true"></span>
            <input id="globalSearchInput" type="search" placeholder="검색어를 입력해주세요." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" aria-autocomplete="none" />
          </div>
        </div>
        <div class="toy-panel active overview-panel" data-toy-panel="overview">

                    <div class="catalog-dropdown-menu">
                      <button type="button" class="ui-dropdown-item active" data-overview-search-scope="all">전체</button>
                      <button type="button" class="ui-dropdown-item" data-overview-search-scope="bey">베이</button>
                      <button type="button" class="ui-dropdown-item" data-overview-search-scope="tools">장비</button>
                      <button type="button" class="ui-dropdown-item" data-overview-search-scope="product">제품</button>
                      <button type="button" class="ui-dropdown-item" data-overview-search-scope="manga">만화</button>
                      <button type="button" class="ui-dropdown-item" data-overview-search-scope="anime">애니</button>

                  </details>
                  <span class="search-icon" aria-hidden="true"></span>
                  <input id="overviewSearchInput" type="search" placeholder="찾고 싶은 정보를 검색해보세요." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" aria-autocomplete="none" />
                </div>
              </div>
            </div>

            <div class="overview-card-grid" aria-label="도감 탐색">
              <button class="ui-card-button overview-open-card" type="button" data-category-catalog-open>
                <span>완구</span>
                <strong>도감</strong>
                <small>베이와 장비 목록</small>
                <b aria-hidden="true">→</b>
              </button>
              <button class="ui-card-button overview-open-card" type="button" data-category-release-open>
                <span>완구</span>
                <strong>출시 정보</strong>
                <small>제품 발매 정보</small>
                <b aria-hidden="true">→</b>
              </button>
              <button class="ui-card-button overview-open-card is-pending" type="button">

                <b aria-hidden="true">→</b>
              </button>
              <button class="ui-card-button overview-open-card" type="button" data-category-anime-open>
                <span>미디어</span>
                <strong>애니메이션</strong>

                <b aria-hidden="true">→</b>
              </button>
            </div>
          </section>
        </div>

            <div class="search-results-heading">
              <h2 id="searchResultsTitle">전체 검색결과</h2>

            <div class="search-results-meta" id="searchResultsMeta"></div>
            <div class="search-results-list" id="globalGrid" aria-live="polite"></div>
          </section>
        </div>

        <div class="toy-panel catalog-panel" data-toy-panel="catalog" data-catalog-scope="all">

            <div>
              <h2>도감</h2>
            </div>
            <p class="result-count"><b id="catalogCount">0</b>개 항목</p>
          </div>

          <div class="catalog-control-bar">
            <div class="toolbar catalog-toolbar">
              <div class="unified-search catalog-local-search">
                <div class="search-box global-search-box catalog-search-box">
                  <span class="search-icon" aria-hidden="true"></span>
                  <input id="catalogSearchInput" type="search" placeholder="도감 안에서 검색" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" aria-autocomplete="none" />

              </div>
              <button type="button" class="catalog-filter-toggle" id="catalogFilterToggle" aria-expanded="false" aria-controls="catalogDropdownFilters">상세</button>
            </div>
          </div>

          <div class="catalog-combined">
            <section class="catalog-subsection" data-catalog-section="catalog">
              <div class="catalog-filter-row">

                        <div class="catalog-filter-options"></div>

                      <div class="catalog-filter-group" data-filter-group="kind" data-filter-label="종류">

                      </div>
                    </div>
                    <div class="catalog-filter-compact">
                      <details class="catalog-filter-dropdown catalog-dropdown" data-filter-group="series" data-filter-label="시리즈">

                        <div class="catalog-dropdown-menu"></div>

                      <details class="catalog-filter-dropdown catalog-dropdown" data-filter-group="kind" data-filter-label="종류">

                        <div class="catalog-dropdown-menu"></div>

                    </div>

                        <div class="catalog-filter-options"></div>
                      </div>
                      <div class="catalog-filter-group" data-catalog-dependent="system" data-filter-label="시스템" hidden>
                        <div class="catalog-filter-options"></div>
                      </div>
                      <div class="catalog-filter-group" data-catalog-dependent="type" data-filter-label="타입" hidden>
                        <div class="catalog-filter-options"></div>
                      </div>
                      <div class="catalog-filter-group" data-catalog-dependent="spin" data-filter-label="회전" hidden>

                    <div class="catalog-filter-compact">
                      <details class="catalog-filter-dropdown catalog-dropdown" data-catalog-dependent="subtype" data-filter-label="세부" hidden>
                        <summary><span class="catalog-filter-label">세부</span><b class="catalog-dropdown-value">전체</b></summary>
                        <div class="catalog-dropdown-menu"></div>
                      </details>
                      <details class="catalog-filter-dropdown catalog-dropdown" data-catalog-dependent="system" data-filter-label="시스템" hidden>
                        <summary><span class="catalog-filter-label">시스템</span><b class="catalog-dropdown-value">전체</b></summary>
                        <div class="catalog-dropdown-menu"></div>
                      </details>
                      <details class="catalog-filter-dropdown catalog-dropdown" data-catalog-dependent="type" data-filter-label="타입" hidden>
                        <summary><span class="catalog-filter-label">타입</span><b class="catalog-dropdown-value">전체</b></summary>
                        <div class="catalog-dropdown-menu"></div>
                      </details>
                      <details class="catalog-filter-dropdown catalog-dropdown" data-catalog-dependent="spin" data-filter-label="회전" hidden>
                        <summary><span class="catalog-filter-label">회전</span><b class="catalog-dropdown-value">전체</b></summary>
                        <div class="catalog-dropdown-menu"></div>
                      </details>
                    </div>
                  </div>
                  <div class="catalog-filter-chips is-empty" data-catalog-filter-chips="catalog" aria-hidden="true"></div>
                </div>
              </div>
              <div class="catalog-grid" id="catalogGrid"></div>
            </section>
          </div>

    <button class="to-top" id="toTop" type="button" aria-label="맨 위로 이동">↑</button>
