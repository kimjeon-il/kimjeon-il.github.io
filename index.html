<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>베이 아카이브 - 베이블레이드 도감</title>
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/woff2/PretendardVariable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  <link rel="stylesheet" href="./styles.css?v=20260626-release-tabs-align" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#" data-home>
        <span class="brand-mark">B</span>
        <span><b>베이</b> 아카이브</span>
      </a>
      <nav class="nav">
        <div class="nav-group">
          <button class="nav-link" data-toy-section="catalog">도감</button>
          <div class="nav-submenu nav-filter-menu" id="catalogNavFilters">
            <button class="sub-filter" type="button" data-catalog-nav-scope="bey">베이</button>
            <button class="sub-filter" type="button" data-catalog-nav-scope="tools">장비</button>
          </div>
        </div>
      </nav>
      <button class="menu-button" id="menuButton" type="button" aria-label="메뉴 열기" aria-controls="mobileDrawer" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </header>

    <aside class="mobile-drawer" id="mobileDrawer" aria-hidden="true">
      <div class="mobile-drawer-header">
        <strong>메뉴</strong>
        <button class="mobile-drawer-close" type="button" aria-label="메뉴 닫기">×</button>
      </div>
      <nav class="mobile-drawer-nav" aria-label="모바일 메뉴">
        <section class="mobile-drawer-section">
          <button class="mobile-primary" type="button" data-mobile-section="catalog">도감</button>
          <div class="mobile-secondary" aria-label="도감 분류">
            <button type="button" data-mobile-catalog-scope="bey">베이</button>
            <button type="button" data-mobile-catalog-scope="tools">장비</button>
          </div>
        </section>
      </nav>
    </aside>

    <main>
      <section class="catalog-section active" id="catalogContent">
        <div id="unifiedSearchHome"></div>
        <div class="unified-search">
          <div class="search-box global-search-box">
            <details class="search-scope catalog-dropdown" id="globalSearchScope" data-scope="all" aria-label="검색 범위">
              <summary><b class="catalog-dropdown-value">전체</b></summary>
              <div class="catalog-dropdown-menu">
                <button type="button" class="active" data-global-search-scope="all">전체</button>
                <button type="button" data-global-search-scope="bey">베이</button>
                <button type="button" data-global-search-scope="tools">장비</button>
              </div>
            </details>
            <span class="search-icon" aria-hidden="true"></span>
            <input id="globalSearchInput" type="search" placeholder="검색어를 입력해주세요." />
          </div>
        </div>
        <div class="toy-panel active overview-panel" data-toy-panel="overview">
          <section class="overview-home">
            <div class="overview-hero">
              <div class="overview-copy">
                <h2>베이 아카이브</h2>
                <p class="overview-intro">
                  베이블레이드 비공식 도감
                </p>
                <div class="overview-search" role="search">
                  <details class="search-scope catalog-dropdown" id="overviewSearchScope" data-scope="all" aria-label="검색 범위">
                    <summary><b class="catalog-dropdown-value">전체</b></summary>
                    <div class="catalog-dropdown-menu">
                      <button type="button" class="active" data-overview-search-scope="all">전체</button>
                      <button type="button" data-overview-search-scope="bey">베이</button>
                      <button type="button" data-overview-search-scope="tools">장비</button>
                    </div>
                  </details>
                  <span class="search-icon" aria-hidden="true"></span>
                  <input id="overviewSearchInput" type="search" placeholder="찾고 싶은 정보를 검색해보세요." />
                </div>
              </div>

              <div class="overview-visual" aria-hidden="true">
              </div>
            </div>

            <div class="overview-card-grid" aria-label="도감 탐색">
              <button class="overview-open-card" type="button" data-overview-guide-open>
                <span>완구 소개</span>
                <strong>개요</strong>
                <small>구조, 타입, 회전방향</small>
                <b aria-hidden="true">→</b>
              </button>
              <button class="overview-open-card" type="button" data-overview-release-open>
                <span>자료</span>
                <strong>출시 정보</strong>
                <small>제품번호와 발매 정보</small>
                <b aria-hidden="true">→</b>
              </button>
              <button class="overview-open-card" type="button" data-toy-section="catalog">
                <span>완구 도감</span>
                <strong>도감</strong>
                <small>베이와 장비</small>
                <b aria-hidden="true">→</b>
              </button>
              <button class="overview-open-card is-pending" type="button">
                <span>미디어</span>
                <strong>만화</strong>
                <small>만화판 자료</small>
                <b aria-hidden="true">→</b>
              </button>
              <button class="overview-open-card is-pending" type="button">
                <span>미디어</span>
                <strong>애니메이션</strong>
                <small>애니메이션 자료</small>
                <b aria-hidden="true">→</b>
              </button>
            </div>
          </section>
        </div>

        <div class="toy-panel search-results-panel" data-toy-panel="all">
          <section class="search-results-page" aria-labelledby="searchResultsTitle">
            <div class="search-results-heading">
              <p class="search-results-eyebrow">검색결과</p>
              <h2 id="searchResultsTitle">전체 검색결과</h2>
              <p class="search-results-summary"><b id="globalCount">0</b>개 항목</p>
            </div>
            <div class="search-results-meta" id="searchResultsMeta"></div>
            <div class="search-results-list" id="globalGrid" aria-live="polite"></div>
          </section>
        </div>

        <div class="toy-panel catalog-panel" data-toy-panel="catalog" data-catalog-scope="all">
          <div class="section-heading">
            <div>
              <h2>도감</h2>
            </div>
            <p class="result-count"><b id="catalogCount">0</b>개 항목</p>
          </div>

          <div class="catalog-control-bar">
            <div class="toolbar catalog-toolbar"></div>
          </div>

          <div class="catalog-combined">
            <section class="catalog-subsection" data-catalog-section="catalog">
              <div class="catalog-filter-row">
                <div class="catalog-dropdowns catalog-filter-groups" id="gearDropdownFilters" aria-label="도감 필터">
                  <div class="catalog-filter-primary">
                    <div class="catalog-filter-expanded">
                      <div class="catalog-filter-group" data-filter-group="series" data-filter-label="시리즈">
                        <div class="catalog-filter-options">
                          <button type="button" class="active" data-gear-series="" data-summary-label="전체">전체</button>
                          <button type="button" data-gear-series="topblade">탑블레이드</button>
                          <button type="button" data-gear-series="metal fight">메탈베이블레이드</button>
                          <button type="button" data-gear-series="burst">베이블레이드 버스트</button>
                          <button type="button" data-gear-series="x">베이블레이드 X</button>
                        </div>
                      </div>
                      <div class="catalog-filter-group" data-filter-group="kind" data-filter-label="종류">
                        <div class="catalog-filter-options">
                          <button type="button" class="active" data-gear-kind="" data-summary-label="전체">전체</button>
                          <button type="button" data-gear-kind="bey">베이</button>
                          <button type="button" data-gear-kind="parts">부품</button>
                          <button type="button" data-gear-kind="tools">장비</button>
                        </div>
                      </div>
                    </div>
                    <div class="catalog-filter-compact">
                      <details class="catalog-filter-dropdown catalog-dropdown" data-filter-group="series" data-filter-label="시리즈">
                        <summary><span class="catalog-filter-label">시리즈</span><b class="catalog-dropdown-value">전체</b></summary>
                        <div class="catalog-dropdown-menu">
                        <button type="button" class="active" data-gear-series="" data-summary-label="전체">전체</button>
                        <button type="button" data-gear-series="topblade">탑블레이드</button>
                        <button type="button" data-gear-series="metal fight">메탈베이블레이드</button>
                        <button type="button" data-gear-series="burst">베이블레이드 버스트</button>
                        <button type="button" data-gear-series="x">베이블레이드 X</button>
                        </div>
                      </details>
                      <details class="catalog-filter-dropdown catalog-dropdown" data-filter-group="kind" data-filter-label="종류">
                        <summary><span class="catalog-filter-label">종류</span><b class="catalog-dropdown-value">전체</b></summary>
                        <div class="catalog-dropdown-menu">
                        <button type="button" class="active" data-gear-kind="" data-summary-label="전체">전체</button>
                        <button type="button" data-gear-kind="bey">베이</button>
                        <button type="button" data-gear-kind="parts">부품</button>
                        <button type="button" data-gear-kind="tools">장비</button>
                        </div>
                      </details>
                    </div>
                  </div>
                  <div class="catalog-filter-advanced" data-catalog-filter-advanced="bey" hidden>
                    <div class="catalog-filter-expanded">
                      <div class="catalog-filter-group" data-gear-dependent="subtype" data-filter-label="세부" hidden>
                        <div class="catalog-filter-options"></div>
                      </div>
                      <div class="catalog-filter-group" data-gear-dependent="system" data-filter-label="시스템" hidden>
                        <div class="catalog-filter-options">
                          <button type="button" class="active" data-gear-system="" data-summary-label="전체">전체</button>
                          <button type="button" data-gear-system="basic">4단 구조</button>
                          <button type="button" data-gear-system="hybrid">하이브리드</button>
                          <button type="button" data-gear-system="4d">4D</button>
                          <button type="button" data-gear-system="synchrome">싱크롬</button>
                        </div>
                      </div>
                      <div class="catalog-filter-group" data-gear-dependent="type" data-filter-label="타입" hidden>
                        <div class="catalog-filter-options">
                          <button type="button" class="active" data-gear-type="" data-summary-label="전체">전체</button>
                          <button type="button" data-gear-type="ATTACK">공격형</button>
                          <button type="button" data-gear-type="DEFENSE">방어형</button>
                          <button type="button" data-gear-type="STAMINA">지구형</button>
                          <button type="button" data-gear-type="BALANCE">균형형</button>
                        </div>
                      </div>
                      <div class="catalog-filter-group" data-gear-dependent="spin" data-filter-label="회전" hidden>
                        <div class="catalog-filter-options">
                          <button type="button" class="active" data-gear-spin="" data-summary-label="전체">전체</button>
                          <button type="button" data-gear-spin="RIGHT SPIN">우회전</button>
                          <button type="button" data-gear-spin="LEFT SPIN">좌회전</button>
                          <button type="button" data-gear-spin="DUAL SPIN">양회전</button>
                        </div>
                      </div>
                    </div>
                    <div class="catalog-filter-compact">
                      <details class="catalog-filter-dropdown catalog-dropdown" data-gear-dependent="subtype" data-filter-label="세부" hidden>
                        <summary><span class="catalog-filter-label">세부</span><b class="catalog-dropdown-value">전체</b></summary>
                        <div class="catalog-dropdown-menu"></div>
                      </details>
                      <details class="catalog-filter-dropdown catalog-dropdown" data-gear-dependent="system" data-filter-label="시스템" hidden>
                        <summary><span class="catalog-filter-label">시스템</span><b class="catalog-dropdown-value">전체</b></summary>
                        <div class="catalog-dropdown-menu">
                          <button type="button" class="active" data-gear-system="" data-summary-label="전체">전체</button>
                          <button type="button" data-gear-system="basic">4단 구조</button>
                          <button type="button" data-gear-system="hybrid">하이브리드</button>
                          <button type="button" data-gear-system="4d">4D</button>
                          <button type="button" data-gear-system="synchrome">싱크롬</button>
                        </div>
                      </details>
                      <details class="catalog-filter-dropdown catalog-dropdown" data-gear-dependent="type" data-filter-label="타입" hidden>
                        <summary><span class="catalog-filter-label">타입</span><b class="catalog-dropdown-value">전체</b></summary>
                        <div class="catalog-dropdown-menu">
                          <button type="button" class="active" data-gear-type="" data-summary-label="전체">전체</button>
                          <button type="button" data-gear-type="ATTACK">공격형</button>
                          <button type="button" data-gear-type="DEFENSE">방어형</button>
                          <button type="button" data-gear-type="STAMINA">지구형</button>
                          <button type="button" data-gear-type="BALANCE">균형형</button>
                        </div>
                      </details>
                      <details class="catalog-filter-dropdown catalog-dropdown" data-gear-dependent="spin" data-filter-label="회전" hidden>
                        <summary><span class="catalog-filter-label">회전</span><b class="catalog-dropdown-value">전체</b></summary>
                        <div class="catalog-dropdown-menu">
                          <button type="button" class="active" data-gear-spin="" data-summary-label="전체">전체</button>
                          <button type="button" data-gear-spin="RIGHT SPIN">우회전</button>
                          <button type="button" data-gear-spin="LEFT SPIN">좌회전</button>
                          <button type="button" data-gear-spin="DUAL SPIN">양회전</button>
                        </div>
                      </details>
                      </div>
                  </div>
                  <div class="catalog-filter-chips is-empty" data-catalog-filter-chips="catalog" aria-hidden="true"></div>
                </div>
              </div>
              <div class="gear-grid" id="gearGrid"></div>
            </section>
          </div>
        </div>
      </section>

    </main>

    <dialog id="detailModal">
      <button class="modal-close" id="modalClose" aria-label="상세 닫기">×</button>
      <div id="modalContent"></div>
    </dialog>

    <footer>
      <a class="brand" href="#"><span class="brand-mark">B</span><span><b>베이</b> 아카이브</span></a>
      <p>제품, 베이, 장비를 정리한 비공식 팬 도감</p>
    </footer>
    <button class="to-top" id="toTop" type="button" aria-label="맨 위로 이동">↑</button>
  <script src="./app.js?v=20260626-release-tabs-align"></script>
  </body>
</html>
